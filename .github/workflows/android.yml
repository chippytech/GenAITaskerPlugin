name: Android CI + Nightly

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      # Optional: deeper nightly tests
      - name: Run full test suite (nightly only)
        if: github.event_name == 'schedule'
        run: ./gradlew test

      # ✅ Upload APK ONLY for nightly builds
      - name: Upload APK
        if: github.event_name == 'schedule'
        uses: actions/upload-artifact@v4
        with:
          name: nightly-apk
          path: app/build/outputs/apk/
